apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: p2p-ingress
  namespace: ai-agent
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - prompt-to-prod.example.com
    secretName: p2p-tls
  rules:
  - host: prompt-to-prod.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-agent
            port:
              number: 8000
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: ai-agent
            port:
              number: 8000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ai-agent
            port:
              number: 8000
