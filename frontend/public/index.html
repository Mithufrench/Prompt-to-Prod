<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt-to-Prod - AI DevOps Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #667eea;
            margin-bottom: 5px;
            font-size: 2.5em;
        }
        .subtitle { 
            color: #666;
            font-size: 1.1em;
        }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .chat-box {
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 5px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .message.user {
            background: #667eea;
            color: white;
            text-align: right;
        }
        .message.agent {
            background: #e0e0e0;
            color: #333;
            text-align: left;
        }
        .status {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .feature {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .feature-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Prompt-to-Prod</h1>
            <p class="subtitle">AI-Powered Self-Service DevOps Platform</p>
        </header>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <h3>AI Agent</h3>
                <p>LangChain-powered multi-agent orchestration</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🔧</div>
                <h3>Infrastructure</h3>
                <p>Terraform, Ansible, Docker, Kubernetes</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <h3>Monitoring</h3>
                <p>Prometheus, Grafana, LangSmith tracing</p>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <h2>💬 AI Chat</h2>
                <div class="chat-box" id="chatBox"></div>
                <div class="form-group">
                    <input type="text" id="chatInput" placeholder="Ask me anything about DevOps..." />
                </div>
                <button onclick="sendChat()">Send Message</button>
                <div id="chatStatus"></div>
            </div>

            <div class="card">
                <h2>🚀 Quick Deploy</h2>
                <form onsubmit="handleDeploy(event)">
                    <div class="form-group">
                        <label>Project Name</label>
                        <input type="text" id="projectName" placeholder="my-app" required />
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="projectDesc" placeholder="Project description..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Repository URL</label>
                        <input type="text" id="repoUrl" placeholder="https://github.com/user/repo" required />
                    </div>
                    <div class="form-group">
                        <label>Environment</label>
                        <select id="environment" required>
                            <option value="">-- Select --</option>
                            <option value="dev">Development</option>
                            <option value="staging">Staging</option>
                            <option value="prod">Production</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Deployment Type</label>
                        <select id="deploymentType" required>
                            <option value="">-- Select --</option>
                            <option value="app">Application</option>
                            <option value="infra">Infrastructure</option>
                            <option value="both">Both</option>
                        </select>
                    </div>
                    <button type="submit">Deploy</button>
                </form>
                <div id="deployStatus"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const chatBox = document.getElementById('chatBox');
            const message = input.value.trim();
            
            if (!message) return;

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = message;
            chatBox.appendChild(userMsg);
            input.value = '';

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: message })
                });

                const data = await response.json();
                const agentMsg = document.createElement('div');
                agentMsg.className = 'message agent';
                agentMsg.textContent = data.response;
                chatBox.appendChild(agentMsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'message agent';
                errorMsg.textContent = 'Error: ' + error.message;
                chatBox.appendChild(errorMsg);
            }
        }

        async function handleDeploy(e) {
            e.preventDefault();
            const statusDiv = document.getElementById('deployStatus');
            
            try {
                statusDiv.innerHTML = '<div class="status info">🔄 Deploying...</div>';

                const response = await fetch(`${API_BASE}/deploy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_name: document.getElementById('projectName').value,
                        description: document.getElementById('projectDesc').value,
                        repo_url: document.getElementById('repoUrl').value,
                        target_environment: document.getElementById('environment').value,
                        deployment_type: document.getElementById('deploymentType').value,
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.innerHTML = `<div class="status success">✅ Deployment successful! Project: ${data.project}</div>`;
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ Deployment failed: ${data.detail}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Error: ${error.message}</div>`;
            }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });
    </script>
</body>
</html>
