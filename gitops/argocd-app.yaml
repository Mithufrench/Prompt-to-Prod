apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: p2p-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/prompt-to-prod.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 10
